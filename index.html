  <meta charset="UTF-8" />

  <title>FOR ADS TG : @TEAMUNKLEADER</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #f5c518;
      --gold2: #ffaa00;
      --orange: #ff6a00;
      --dark: #080808;
      --card: #101010;
      --text: #f0f0f0;
      --muted: #666;
      --radius-btn: 100px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* grain overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999;
    }

    /* page bg glow */
    .bg-glow {
      position: fixed; top: -10vh; left: 50%;
      transform: translateX(-50%);
      width: min(700px, 130vw); height: 500px;
      background: radial-gradient(ellipse at center,
        rgba(245,197,24,0.13) 0%,
        rgba(255,106,0,0.06) 40%,
        transparent 70%);
      pointer-events: none; z-index: 0;
    }

    /* LAYOUT */
    .page {
      position: relative; z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 20px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
    }

    /* RADIATION AVATAR */
    .avatar-section {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 210px; height: 210px;
    }

    /* expanding radiation rings */
    .rad-ring {
      position: absolute;
      border-radius: 50%;
      border: 1.5px solid rgba(245,197,24,0.22);
      animation: radiate 3.2s ease-out infinite;
    }
    .rad-ring:nth-child(1) { width: 155px; height: 155px; animation-delay: 0s; }
    .rad-ring:nth-child(2) { width: 180px; height: 180px; animation-delay: 0.8s; }
    .rad-ring:nth-child(3) { width: 205px; height: 205px; animation-delay: 1.6s; }
    .rad-ring:nth-child(4) { width: 230px; height: 230px; animation-delay: 2.4s; }

    @keyframes radiate {
      0%   { opacity: 0.8; transform: scale(0.8); }
      100% { opacity: 0;   transform: scale(1.4); }
    }

    /* warm light blob behind avatar */
    .avatar-section::before {
      content: '';
      position: absolute;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255,185,0,0.60) 0%,
        rgba(255,100,0,0.28) 45%,
        transparent 70%);
      filter: blur(22px);
      animation: blobPulse 2.6s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes blobPulse {
      from { opacity: 0.65; transform: scale(0.88); }
      to   { opacity: 1;    transform: scale(1.18); }
    }

    /* spinning conic ring */
    .avatar-spin {
      position: absolute;
      width: 150px; height: 150px;
      border-radius: 50%;
      background: conic-gradient(
        var(--gold), var(--gold2), var(--orange),
        transparent 55%, var(--gold)
      );
      animation: spin 5s linear infinite;
      z-index: 1;
    }
    /* cutout to show only the border */
    .avatar-spin::after {
      content: '';
      position: absolute; inset: 5px;
      border-radius: 50%;
      background: var(--dark);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* actual photo */
    .avatar-img {
      position: relative; z-index: 2;
      width: 134px; height: 134px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--dark);
      box-shadow: 0 0 0 2px rgba(245,197,24,0.3);
    }

    /* NAME */
    .name-tag {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(1.6rem, 6vw, 2.2rem);
      letter-spacing: 5px;
      color: var(--gold);
      text-shadow: 0 0 24px rgba(245,197,24,0.45);
      margin-top: -4px;
    }

    /* HEADLINE */
    .headline {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2rem, 8.5vw, 3.4rem);
      line-height: 1.08;
      letter-spacing: 1px;
      color: var(--text);
    }
    .headline em { color: var(--gold); font-style: normal; }

    /* SUBTEXT */
    .sub {
      font-size: clamp(0.85rem, 3.2vw, 1rem);
      font-weight: 600;
      color: #bbb;
      line-height: 1.6;
      max-width: 380px;
    }

    /* CTA BUTTON — above timer */
    .btn-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
    }

    .cta-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 60%, var(--orange) 100%);
      color: #000;
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(1.25rem, 5vw, 1.65rem);
      letter-spacing: 3px;
      padding: 16px 42px;
      border-radius: var(--radius-btn);
      text-decoration: none;
      /* thick white dotted stroke right on the button surface */
      outline: 6px dotted rgba(255,255,255,0.95);
      outline-offset: -2px;
      box-shadow:
        0 6px 28px rgba(245,197,24,0.50),
        0 2px 8px rgba(0,0,0,0.6);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      overflow: visible;
      white-space: nowrap;
      width: min(320px, 88vw);
    }
    .cta-btn::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: var(--radius-btn);
      background: linear-gradient(160deg, rgba(255,255,255,0.22) 0%, transparent 55%);
      pointer-events: none;
    }
    .cta-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 44px rgba(245,197,24,0.65), 0 4px 14px rgba(0,0,0,0.55);
    }
    .cta-btn:active { transform: scale(0.96); }

    .click-label {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(1.1rem, 4vw, 1.3rem);
      letter-spacing: 3px;
      color: #ddd;
    }

    /* COUNTDOWN */
    .countdown-wrap {
      background: var(--card);
      border: 1px solid rgba(245,197,24,0.18);
      border-radius: 20px;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      width: min(380px, 96vw);
      box-shadow:
        0 0 0 1px rgba(245,197,24,0.05),
        0 8px 40px rgba(0,0,0,0.5);
    }
    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }
    .cd-num {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2.4rem, 9vw, 3.2rem);
      line-height: 1;
      color: var(--gold);
      text-shadow: 0 0 16px rgba(245,197,24,0.55);
    }
    .cd-label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-top: 5px;
    }
    .cd-sep {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2rem, 7vw, 2.8rem);
      color: var(--gold);
      opacity: 0.45;
      margin-bottom: 18px;
      padding: 0 2px;
    }

    /* DIVIDER */
    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 2px;
    }

    /* FOOTER */
    .footer-link {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-link span { color: var(--gold); }
    .footer-link:hover { color: var(--text); }

    /* ENTRANCE ANIMATIONS */
    .page > * {
      animation: fadeUp 0.65s cubic-bezier(0.22,1,0.36,1) both;
    }
    .page > *:nth-child(1) { animation-delay: 0.05s; }
    .page > *:nth-child(2) { animation-delay: 0.15s; }
    .page > *:nth-child(3) { animation-delay: 0.25s; }
    .page > *:nth-child(4) { animation-delay: 0.35s; }
    .page > *:nth-child(5) { animation-delay: 0.45s; }
    .page > *:nth-child(6) { animation-delay: 0.55s; }
    .page > *:nth-child(7) { animation-delay: 0.62s; }
    .page > *:nth-child(8) { animation-delay: 0.68s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 360px) {
      .cd-num { font-size: 2rem; }
      .cta-btn { padding: 13px 24px; font-size: 1.15rem; }
    }
  </style>
</head>

<script>
  const end = Date.now() + 24 * 60 * 60 * 1000;
  const pad = n => String(n).padStart(2, '0');
  function tick() {
    const d = Math.max(0, end - Date.now());
    document.getElementById('cd-secs').textContent  = pad(Math.floor(d/1000)%60);
    document.getElementById('cd-mins').textContent  = pad(Math.floor(d/60000)%60);
    document.getElementById('cd-hours').textContent = pad(Math.floor(d/3600000)%24);
    document.getElementById('cd-days').textContent  = pad(Math.floor(d/86400000));
  }
  tick();
  setInterval(tick, 1000);
</script>
